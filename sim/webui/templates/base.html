<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Underwriting Desk{% endblock %}</title>
  <style>
    :root {
      --ink: oklch(22% 0.02 265);
      --ink-soft: oklch(45% 0.02 265);
      --surface: oklch(98.5% 0.005 265);
      --card: oklch(100% 0 0);
      --line: oklch(90% 0.01 265);
      --accent: oklch(52% 0.18 265);
      --accent-soft: oklch(95% 0.04 265);
      --approve: oklch(58% 0.15 150);
      --conditional: oklch(70% 0.15 75);
      --decline: oklch(58% 0.20 25);
      --escalated: oklch(55% 0.22 15);
      --info: oklch(60% 0.12 230);
      --radius: 14px;
      --shadow: 0 1px 2px oklch(22% 0.02 265 / 0.06), 0 8px 24px oklch(22% 0.02 265 / 0.06);
      --mono: ui-monospace, "SF Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--surface); color: var(--ink);
      font-family: var(--sans); line-height: 1.5;
      background-image: radial-gradient(oklch(90% 0.02 265 / 0.5) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    header.top {
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
      padding: 1.4rem clamp(1rem, 4vw, 3rem); border-bottom: 1px solid var(--line);
      background: var(--card);
    }
    header.top h1 { margin: 0; font-size: 1.15rem; letter-spacing: -0.01em; }
    header.top .tag {
      font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--accent); background: var(--accent-soft);
      padding: 0.2rem 0.5rem; border-radius: 6px;
    }
    header.top a { color: var(--ink-soft); text-decoration: none; font-size: 0.85rem; }
    header.top a:hover { color: var(--accent); }
    main { padding: clamp(1rem, 4vw, 3rem); max-width: 1100px; margin: 0 auto; }
    h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
         color: var(--ink-soft); margin: 2rem 0 0.8rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 1.1rem 1.2rem; box-shadow: var(--shadow);
    }
    .card h3 { margin: 0 0 0.3rem; font-size: 1rem; }
    .card p.desc { margin: 0 0 0.9rem; color: var(--ink-soft); font-size: 0.85rem; }
    .chip {
      display: inline-block; font-family: var(--mono); font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; padding: 0.25rem 0.55rem;
      border-radius: 999px; color: white;
    }
    .chip.approve { background: var(--approve); }
    .chip.conditional_approve { background: var(--conditional); }
    .chip.decline { background: var(--decline); }
    .chip.escalated { background: var(--escalated); }
    .chip.info_requested { background: var(--info); }
    .chip.pending, .chip.running, .chip.suspended { background: var(--ink-soft); }
    .chip.closed { background: var(--approve); }
    button, .btn {
      font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 9px;
      padding: 0.5rem 0.9rem; background: var(--accent); color: white; transition: transform .12s ease, filter .12s ease;
    }
    button:hover, .btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
    button.ghost { background: var(--accent-soft); color: var(--accent); }
    .metrics { display: flex; gap: 1.4rem; flex-wrap: wrap; font-family: var(--mono); }
    .metrics .m { display: flex; flex-direction: column; }
    .metrics .m b { font-size: 1.4rem; letter-spacing: -0.02em; }
    .metrics .m span { font-size: 0.7rem; text-transform: uppercase; color: var(--ink-soft); letter-spacing: 0.06em; }
    ol.timeline { list-style: none; margin: 0; padding: 0; }
    ol.timeline li { display: grid; grid-template-columns: 130px 80px 1fr; gap: 0.8rem;
      padding: 0.55rem 0; border-bottom: 1px dashed var(--line); align-items: baseline; }
    ol.timeline .stage { font-family: var(--mono); font-size: 0.72rem; color: var(--ink-soft); text-transform: uppercase; }
    .actor { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .actor.human { color: var(--accent); } .actor.agent { color: var(--approve); }
    .actor.robot { color: var(--info); } .actor.system { color: var(--conditional); }
    .gate { background: var(--accent-soft); border: 1px solid var(--accent); }
    .gate form { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-top: 0.8rem; }
    .gate input[type=text] { flex: 1; min-width: 180px; padding: 0.5rem; border: 1px solid var(--line); border-radius: 8px; font: inherit; }
    .muted { color: var(--ink-soft); font-size: 0.85rem; }
    .rationale { background: var(--surface); border-left: 3px solid var(--accent); padding: 0.7rem 0.9rem; border-radius: 0 8px 8px 0; font-size: 0.9rem; }
    ul.flat { margin: 0.4rem 0; padding-left: 1.1rem; font-size: 0.85rem; color: var(--ink-soft); }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header class="top">
    <h1>Mortgage Underwriting Desk</h1>
    <span class="tag">UiPath Maestro Case · demo</span>
    <a href="/">← all cases</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
